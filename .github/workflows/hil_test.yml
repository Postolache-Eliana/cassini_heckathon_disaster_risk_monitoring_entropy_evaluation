name: Hardware-in-the-Loop Tests

# Trigger the workflow on pushes to main or pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hil-tests:
    name: Run Physical Hardware Tests
    # This specifically targets a self-hosted runner. 
    # You must configure your Pi Zero W as a GitHub Actions Runner and assign it these labels.
    runs-on: [self-hosted, linux, arm]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyserial RPi.GPIO spidev

    - name: Run Hardware Integration Tests
      run: |
        # Run pytest with verbose output to test the physical UART and SPI connections
        pytest -v tests/test_hardware.py
